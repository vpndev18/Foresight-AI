services:

  # =============================================
  # Service 1: ASP.NET Core API
  # =============================================
  api:
    build:
      context: ./FinancialTwin.API      # where the Dockerfile is
      dockerfile: Dockerfile
    container_name: financialtwin_api
    ports:
      - "8080:8080"                     # host:container
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      # Secrets are read from a local `.env` file (see `.env.example`).
      # The `:?` syntax makes `docker compose up` fail fast if the variable is missing.
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_STRING:?DB_CONNECTION_STRING not set}
      - GeminiAi__ApiKey=${GEMINI_API_KEY:?GEMINI_API_KEY not set}
      - Jwt__Key=${JWT_KEY:?JWT_KEY not set}
      - Jwt__Issuer=${JWT_ISSUER:-FinancialTwinAPI}
      - Jwt__Audience=${JWT_AUDIENCE:-FinancialTwinApp}
    networks:
      - financialtwin_net
    restart: unless-stopped

  # =============================================
  # Service 2: React Frontend (served via Nginx)
  # =============================================
  frontend:
    build:
      context: ./FinancialTwin.Web     # where the Dockerfile is
      dockerfile: Dockerfile
    container_name: financialtwin_frontend
    ports:
      - "3000:80"                      # access the app at http://localhost:3000
    depends_on:
      - api                            # start after api container is up
    networks:
      - financialtwin_net
    restart: unless-stopped

# =============================================
# Shared Network
# Both containers can communicate using service names:
#   - frontend → api:8080
# =============================================
networks:
  financialtwin_net:
    driver: bridge
