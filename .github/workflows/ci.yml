name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------
  # Secret scan: fail the build if credentials, API keys, or tokens
  # are committed. Runs first so later jobs don't waste runner time
  # on a PR that needs secret rotation anyway.
  # ---------------------------------------------------------------
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # On push: scans new commits since the previous push.
          # On pull_request: scans commits in the PR diff.
          # On workflow_dispatch: scans the full history.
          # Known historical leaks in commit 8dee94d are excluded via .gitleaksignore.

  # ---------------------------------------------------------------
  # Backend: build, test, and publish code coverage for the .NET API
  # ---------------------------------------------------------------
  backend:
    name: Backend (.NET 9)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore FinancialTwin.sln

      - name: Build (Release, no restore)
        run: dotnet build FinancialTwin.sln --configuration Release --no-restore

      - name: Run tests with coverage
        run: >
          dotnet test FinancialTwin.sln
          --configuration Release
          --no-build
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: ./TestResults
          if-no-files-found: warn

  # ---------------------------------------------------------------
  # Frontend: install, lint, and build the React/Vite app
  # ---------------------------------------------------------------
  frontend:
    name: Frontend (React + Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: FinancialTwin.Web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: FinancialTwin.Web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: FinancialTwin.Web/dist
          if-no-files-found: error

  # ---------------------------------------------------------------
  # Docker: verify both images build successfully
  # Runs only after backend + frontend jobs pass.
  # ---------------------------------------------------------------
  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: ./FinancialTwin.API
          file: ./FinancialTwin.API/Dockerfile
          push: false
          load: false
          tags: financialtwin-api:ci
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Build Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./FinancialTwin.Web
          file: ./FinancialTwin.Web/Dockerfile
          push: false
          load: false
          tags: financialtwin-web:ci
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max
