server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/* requests to the backend API container
    # "api" here is the Docker Compose service name
    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # For all other routes, serve index.html (React Router SPA support)
    # Without this, refreshing on /dashboard would return 404
    location / {
        try_files $uri $uri/ /index.html;
    }
}
